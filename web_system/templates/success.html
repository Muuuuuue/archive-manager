{% extends "base.html" %}

{% block title %}申请成功 - 文件编号与归档系统{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card text-center">
            <div class="card-body py-5">
                <i class="bi bi-check-circle-fill text-success" style="font-size: 80px;"></i>
                <h3 class="mt-4 mb-3">申请成功！</h3>
                <p class="text-muted mb-4">您的文件编号已生成</p>
                
                <div class="bg-light rounded p-4 mb-4">
                    <small class="text-muted d-block mb-2">文件编号</small>
                    <code class="fs-2">{{ file_number }}</code>
                </div>
                
                <div class="alert alert-info" role="alert">
                    <i class="bi bi-info-circle-fill me-2"></i>
                    请将此编号作为文件名，系统将自动归档
                </div>
                
                <div class="d-grid gap-2 d-md-flex justify-content-md-center mt-4">
                    <a href="{{ url_for('apply_page', token=token) }}" class="btn btn-primary btn-lg">
                        <i class="bi bi-plus-lg me-2"></i>继续申请
                    </a>
                    <a href="{{ url_for('archive_page', token=token) }}" class="btn btn-outline-secondary btn-lg">
                        <i class="bi bi-list me-2"></i>查看记录
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
